<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz Educação Digital PRO+</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.container{background:#1e293b;padding:20px;border-radius:12px;width:420px;box-shadow:0 0 10px #000}
button{width:100%;margin:5px 0;padding:10px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer}
#next{background:#22c55e}
.top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
<div class="top">
<span id="progress"></span>
<span id="score"></span>
<span id="timer"></span>
</div>
<h2 id="question"></h2>
<div id="answers"></div>
<button id="next" style="display:none;">Próxima</button>
</div><script>
// 40 PERGUNTAS FIXAS
const questions = [
  {q:"O que é educação digital?",a:["Uso responsável",true,"Jogos",false,"Evitar internet",false,"Postar tudo",false]},
  {q:"O que é phishing?",a:["Golpe online",true,"Jogo",false,"App",false,"Rede",false]},
  {q:"O que é malware?",a:["Software malicioso",true,"App",false,"Rede",false,"Jogo",false]},
  {q:"O que são fake news?",a:["Informações falsas",true,"Verdadeiras",false,"Jogos",false,"Apps",false]},
  {q:"Senha segura deve ser:",a:["Complexa",true,"123456",false,"abc",false,"curta",false]},
  {q:"O que é 2FA?",a:["Segurança extra",true,"Vírus",false,"Erro",false,"Rede",false]},
  {q:"HTTPS significa:",a:["Conexão segura",true,"Site lento",false,"Erro",false,"Download",false]},
  {q:"Wi-Fi público pode:",a:["Expor dados",true,"Ajudar",false,"Nada",false,"Melhorar",false]},
  {q:"Backup é:",a:["Cópia de dados",true,"Apagar",false,"Editar",false,"Enviar",false]},
  {q:"Antivírus serve para:",a:["Proteger",true,"Jogar",false,"Postar",false,"Editar",false]},
  {q:"Engenharia social é:",a:["Manipular pessoas",true,"Programar",false,"Jogar",false,"Editar",false]},
  {q:"Link desconhecido:",a:["Pode ser perigoso",true,"Seguro",false,"Rápido",false,"Útil",false]},
  {q:"Dados pessoais:",a:["Devem ser protegidos",true,"Compartilhar",false,"Ignorar",false,"Publicar",false]},
  {q:"Atualizações servem para:",a:["Segurança",true,"Lentidão",false,"Erro",false,"Nada",false]},
  {q:"Identidade digital:",a:["Dados online",true,"Celular",false,"PC",false,"Senha",false]},
  {q:"Hacker (comum):",a:["Invade sistemas",true,"Professor",false,"Jogador",false,"Designer",false]},
  {q:"Privacidade digital:",a:["Proteger info",true,"Postar tudo",false,"Wi-Fi aberto",false,"Nada",false]},
  {q:"Arquivo suspeito:",a:["Pode ter vírus",true,"Seguro",false,"Melhora PC",false,"Nada",false]},
  {q:"Mensagem suspeita:",a:["Não clicar",true,"Abrir",false,"Responder",false,"Compartilhar",false]},
  {q:"Vírus faz:",a:["Danos",true,"Ajuda",false,"Jogos",false,"Nada",false]},
  {q:"Senha repetida:",a:["Risco maior",true,"Seguro",false,"Fácil",false,"Normal",false]},
  {q:"Fonte de notícia:",a:["Verificar",true,"Ignorar",false,"Compartilhar",false,"Postar",false]},
  {q:"HTTPS protege:",a:["Dados",true,"Tela",false,"Apps",false,"Jogos",false]},
  {q:"Antivírus atualiza:",a:["Proteção",true,"Jogos",false,"Tela",false,"Nada",false]},
  {q:"Senha ideal:",a:["Difícil",true,"Fácil",false,"Curta",false,"Simples",false]},
  {q:"Compartilhar localização:",a:["Arriscado",true,"Seguro",false,"Normal",false,"Recomendado",false]},
  {q:"Download suspeito:",a:["Perigoso",true,"Seguro",false,"Útil",false,"Normal",false]},
  {q:"Privacidade:",a:["Importante",true,"Inútil",false,"Opcional",false,"Sem valor",false]},
  {q:"Internet segura:",a:["Cuidados",true,"Nenhum",false,"Sempre segura",false,"Livre",false]},
  {q:"Golpes online:",a:["Existem",true,"Não existem",false,"São raros",false,"São legais",false]},
  {q:"Senha forte tem:",a:["Símbolos",true,"Apenas letras",false,"Apenas números",false,"Nada",false]},
  {q:"Antivírus detecta:",a:["Ameaças",true,"Jogos",false,"Vídeos",false,"Apps",false]},
  {q:"Compartilhar senha:",a:["Errado",true,"Certo",false,"Normal",false,"Seguro",false]},
  {q:"Wi-Fi aberto:",a:["Risco",true,"Seguro",false,"Melhor",false,"Rápido",false]},
  {q:"Proteção online:",a:["Necessária",true,"Opcional",false,"Inútil",false,"Rara",false]},
  {q:"Ataque digital:",a:["Existe",true,"Não",false,"Raro",false,"Seguro",false]},
  {q:"Dados online:",a:["Devem ser protegidos",true,"Livres",false,"Sem valor",false,"Públicos",false]},
  {q:"Internet:",a:["Precisa cuidado",true,"Sempre segura",false,"Sem risco",false,"Livre",false]},
  {q:"Aplicativos:",a:["Devem atualizar",true,"Ignorar",false,"Excluir",false,"Nada",false]}
];

// EMBARALHAR ARRAY
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

// CONVERTER E EMBARALHAR RESPOSTAS
let questionBank = shuffle(questions.map(q=>({
  question:q.q,
  answers: shuffle([
    {text:q.a[0],correct:q.a[1]},
    {text:q.a[2],correct:q.a[3]},
    {text:q.a[4],correct:q.a[5]},
    {text:q.a[6],correct:q.a[7]}
  ])
})));

let index=0, score=0, timer, timeLeft=10;

const qEl=document.getElementById("question");
const aEl=document.getElementById("answers");
const nextBtn=document.getElementById("next");
const progress=document.getElementById("progress");
const scoreEl=document.getElementById("score");
const timerEl=document.getElementById("timer");

function startTimer(){
  clearInterval(timer);
  timeLeft=10;
  timerEl.innerText="⏱️ "+timeLeft;
  timer=setInterval(()=>{
    timeLeft--;
    timerEl.innerText="⏱️ "+timeLeft;
    if(timeLeft<=0){
      clearInterval(timer);
      nextBtn.style.display="block";
    }
  },1000);
}

function loadQuestion(){
  nextBtn.style.display="none";
  aEl.innerHTML="";

  if(index>=questionBank.length){showFinal();return;}

  let q=questionBank[index];
  qEl.innerText=q.question;
  progress.innerText=`${index+1}/${questionBank.length}`;
  scoreEl.innerText=`Pontos: ${score}`;

  startTimer();

  q.answers.forEach(a=>{
    let btn=document.createElement("button");
    btn.innerText=a.text;
    btn.onclick=()=>{
      clearInterval(timer);
      if(a.correct) score++;
      scoreEl.innerText=`Pontos: ${score}`;
      nextBtn.style.display="block";
    };
    aEl.appendChild(btn);
  });
}

nextBtn.onclick=()=>{index++;loadQuestion()};

function showFinal(){
  qEl.innerText=`Fim! Pontuação: ${score}`;
  aEl.innerHTML="";
  saveRanking(score);
}

function saveRanking(score){
  let ranking=JSON.parse(localStorage.getItem("ranking")||"[]");
  ranking.push(score);
  ranking.sort((a,b)=>b-a);
  localStorage.setItem("ranking",JSON.stringify(ranking));
}

loadQuestion();
</script></body>
